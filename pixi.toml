[project]
name = "snakemake-report-plugin-nanopub"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11,<4"
ruff = ">=0.10.0,<0.11"

[pypi-dependencies]
snakemake-report-plugin-nanopub = { path = ".", editable = true }

[tasks]
format = "ruff format"
lint = "ruff check"
qc = { depends-on = ["format", "lint"] }
test = "pytest"
coverage-report = "pytest --cov=src/snakemake_report_plugin_nanopub --cov-report=term-missing --cov-report=html"

[feature.dev.dependencies]
pytest = ">=8.3.5,<9"
pytest-cov = ">=6.0.0,<7"

[environments]
dev = { features = ["dev"] }
