# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "monthly"

name: Pixi Dependency Updates

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pixi-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0

      - name: Update lockfile
        run: pixi update

      - name: Create PR if lockfile changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): update pixi lockfile"
          title: "chore(deps): update pixi lockfile"
          body: |
            Automated Pixi dependency refresh.

            This updates resolved dependency versions in pixi.lock.
          branch: chore/pixi-lock-update
          delete-branch: true
          labels: dependencies
